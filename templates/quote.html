{% extends "layout.html" %}

{% block title %}Quote{% endblock %}

{% block main %}
<h2>Get a stock quote</h2>
<form action="{{ url_for('quote') }}" method="POST" class="mb-3">
    <input class="form-control w-auto mx-auto" type="text" name="symbol" placeholder="Symbol" autofocus>
    <button class="btn btn-primary mt-2" type="submit">Get Quote</button>
</form>
{% endblock %}
