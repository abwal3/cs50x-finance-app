{% extends "layout.html" %}

{% block title %}Log In{% endblock %}

{% block main %}
<h2>Log In</h2>
<form action="{{ url_for('login') }}" method="post">
    <div class="mb-3">
        <input class="form-control w-auto mx-auto" name="username" placeholder="Username" type="text" autofocus required>
    </div>
    <div class="mb-3">
        <input class="form-control w-auto mx-auto" name="password" placeholder="Password" type="password" required>
    </div>
    <button class="btn btn-primary" type="submit">Log In</button>
</form>
{% endblock %}
